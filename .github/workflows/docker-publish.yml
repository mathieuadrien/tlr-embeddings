# Build & push de l'image Docker du microservice sur GHCR.
#
# Déclencheurs :
#  - push d'un tag `v*.*.*`        → image versionnée (ex. `v0.1.2`, `0.1.2`) + `latest`
#  - push sur `develop`            → image `develop` (suivi de la branche par défaut)
#  - workflow_dispatch (manuel)    → utile pour rebuild ad hoc
#
# Cible : `ghcr.io/<owner>/telaria-embeddings` (consommée par le `compose.yaml`
# de codexia, cf. codexia-doc/guides/install-locale.md §5).
name: docker-publish

on:
  push:
    branches: [develop]
    tags: ["v*.*.*"]
  workflow_dispatch:

permissions:
  contents: read
  packages: write

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}  # <owner>/telaria-embeddings

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          # Stratégie de tags :
          #  - tag git `v1.2.3` → `v1.2.3`, `1.2.3`, `1.2`, `1`, `latest`
          #  - branche `develop` → `develop`
          flavor: |
            latest=auto
          tags: |
            type=ref,event=branch
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=semver,pattern={{major}}

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
